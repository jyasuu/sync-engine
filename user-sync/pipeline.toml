# user-sync/pipeline.toml
#
# Declares which assembled components run on which cron schedule.
# Add a [[pipeline]] block to run additional schedules without any code change.

[[pipeline]]
name      = "global-user-sync"
source    = "user-api"
transform = "user"
sink      = "postgres"
cron      = "0 0 2 * * *"

