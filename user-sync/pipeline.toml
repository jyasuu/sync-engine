# case1-composable.toml
#
# Same pattern as case1-tx-per-window.toml (fetch → transform → tx_upsert,
# one transaction per window) but written in the new composable step_groups
# style instead of the legacy flat retry_steps / iterator / retry sections.
#
# The two files produce identical runtime behaviour.  Use this style when:
#   - You want named, reusable sub-sequences (e.g. shared across pipelines)
#   - The pipeline has multiple retry sections or tx scopes
#   - Nesting depth would make the inline [[main_job.steps.steps...]] syntax hard to read
#
# main.rs:
#   registry.register_envelope::<ApiUserResponse>("ApiUserResponse");
#   registry.register_transform::<ApiUser, DbUser, UserTransform>("UserTransform");
#   registry.register_model::<DbUser>("DbUser");
#   sync_engine::run("pipeline.toml", registry).await

[job]
name = "user-sync"

[job.trigger]
type = "cron"
cron = { env = "SCHEDULER__CRON", default = "0 */30 * * * *" }

# ── Resources ─────────────────────────────────────────────────────────────

[resources.pg]
type            = "postgres"
url             = { env = "SINK__DATABASE_URL" }
max_connections = 5

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type       = "http_service"
http       = "http"
auth       = "auth"
endpoint   = { env = "SOURCE__USER_ENDPOINT" }
realm_type = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }

# ── Slots ─────────────────────────────────────────────────────────────────

[slots.api_rows]
type  = "ApiUser"
scope = "window"

[slots.db_rows]
type  = "DbUser"
scope = "window"

# ── Pre-job ───────────────────────────────────────────────────────────────

[pre_job]
init_resources = true

# ── Step groups ───────────────────────────────────────────────────────────
#
# Named sub-sequences referenced by wrapper steps via `group = "name"`.
# Groups can reference other groups — commit_users is nested inside
# fetch_and_transform via the tx wrapper.

[step_groups.commit_users]
steps = [
  { type = "tx_upsert", model = "DbUser", reads = "db_rows" },
]

[step_groups.fetch_and_transform]
steps = [
  { type = "fetch",     envelope = "ApiUserResponse", writes = "api_rows" },
  { type = "transform", transform = "UserTransform",  reads = "api_rows", writes = "db_rows" },
  { type = "tx", group = "commit_users" },
]

# ── Main job ──────────────────────────────────────────────────────────────
#
# window_loop        — iterates date windows
#   retry            — retries fetch+transform+tx on failure
#     (fetch_and_transform group)
#   sleep            — rate-limit pause between windows

[[main_job.steps]]
type           = "window_loop"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0"  }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7"  }
steps = [
  { type = "retry", max_attempts = 5, backoff_secs = 2, group = "fetch_and_transform" },
  { type = "sleep", secs = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" } },
]

# ── Post-job ──────────────────────────────────────────────────────────────

[[post_job.steps]]
type = "log_summary"

[[post_job.steps]]
type          = "raw_sql"
sql           = { env = "SINK__SYNC_SQL", default = "" }
skip_if_empty = true
