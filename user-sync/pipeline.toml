# user-sync/pipeline.toml
#
# Complete pipeline definition. No Rust code needed except main.rs
# which registers the generated types by name.
#
# Switch patterns by changing:
#   Case 1 (active): db_rows scope=window, tx_upsert inside [[main_job.retry_steps]]
#   Case 2:          db_rows scope=job,    tx_upsert in [[main_job.post_loop_steps]], transform append=true
#   Case 3:          replace [slots.db_rows] with [queues.db_rows] type="tokio",
#                    add [[pre_job.steps]] type="spawn_consumer",
#                    replace tx_upsert with send_to_queue in retry_steps
#   Case 4:          [queues.db_rows] type="rabbitmq" + rabbitmq config
#
# Config value syntax:
#   "literal"                           used as-is
#   { env = "VAR" }                     required env var
#   { env = "VAR", default = "val" }    env var with fallback

[job]
name = "user-sync"

# ── Trigger ────────────────────────────────────────────────────────────────
# Pick one trigger type. All four share the same run_one_tick() core.
#
# Option 1 (active): cron — fires on a schedule, mutex-skips if still running
[job.trigger]
type = "cron"
cron = { env = "SCHEDULER__CRON", default = "0 */30 * * * *" }

# Option 2: once — run a single tick and exit (CI, k8s Job, manual backfill)
# [job.trigger]
# type = "once"

# Option 3: webhook — HTTP POST fires a tick; returns 202 immediately
# [job.trigger]
# type = "webhook"
# host = "0.0.0.0"   # default
# port = 8080         # default

# Option 4: pg_notify — Postgres LISTEN/NOTIFY fires a tick
# [job.trigger]
# type    = "pg_notify"
# channel = { env = "TRIGGER__PG_CHANNEL", default = "sync_trigger" }
# Trigger with: SELECT pg_notify('sync_trigger', '{}');

# ── Resources ─────────────────────────────────────────────────────────────
# Named connections. Engine builds them in dependency order.

[resources.pg]
type            = "postgres"
url             = { env = "SINK__DATABASE_URL" }
max_connections = 5

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type         = "http_service"
http         = "http"
auth         = "auth"
endpoint     = { env = "SOURCE__USER_ENDPOINT" }
realm_type   = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }
# start_param = "start_time"   # default — override if your API uses a different name
# end_param   = "end_time"     # default
# date_format = "%Y%m%d"       # default — use "%Y-%m-%d" or "%Y-%m-%dT00:00:00Z" etc.
# [[resources.svc.extra_params]]
# key   = "api_version"
# value = { env = "SOURCE__API_VERSION", default = "v2" }

# ── Slots ─────────────────────────────────────────────────────────────────
# Named typed data channels shared between steps.

[slots.api_rows]
type  = "ApiUser"   # schema.toml record name — for docs
scope = "window"    # cleared at start of each window

[slots.db_rows]
type  = "DbUser"    # schema.toml record name — for docs
scope = "window"    # case 1: window | case 2: change to "job"

# Case 3/4 — replace [slots.db_rows] with:
# [queues.db_rows]
# type     = "tokio"       # or "rabbitmq"
# capacity = 256

# ── Pre-job ───────────────────────────────────────────────────────────────
# init_resources = true builds all [resources] automatically.

[pre_job]
init_resources = true

# Case 3/4 — add consumer:
# [[pre_job.steps]]
# type        = "spawn_consumer"
# queue       = "db_rows"
# model       = "DbUser"
# commit_mode = "per_batch"   # or "drain_in_post_job"

# ── Main job ──────────────────────────────────────────────────────────────

[main_job.iterator]
type           = "date_window"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0" }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7" }
sleep_secs     = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

[main_job.retry]
max_attempts = 5
backoff_secs = 2

# Steps inside the retry loop — retried on failure per window.

[[main_job.retry_steps]]
type     = "fetch"
envelope = "ApiUserResponse"   # registered in main.rs
writes   = "api_rows"
append   = false

[[main_job.retry_steps]]
type      = "transform"
transform = "UserTransform"    # registered in main.rs
reads     = "api_rows"
writes    = "db_rows"
append    = false              # case 2: change to true

# Case 1 (active): tx per window
[[main_job.retry_steps]]
type  = "tx_upsert"
model = "DbUser"               # registered in main.rs
reads = "db_rows"

# Case 3/4: replace tx_upsert with:
# [[main_job.retry_steps]]
# type  = "send_to_queue"
# reads = "db_rows"
# queue = "db_rows"

# Steps after each window (outside retry loop).
# Note: sleep between windows is controlled by sleep_secs in [main_job.iterator].
# Only add a [[main_job.post_window_steps]] sleep if you set sleep_secs = 0 above
# and want step-level control — using both causes double sleep.

# [[main_job.post_window_steps]]
# type = "sleep"
# secs = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

# Case 2: bulk tx after all windows — uncomment:
# [[main_job.post_loop_steps]]
# type  = "tx_upsert"
# model = "DbUser"
# reads = "db_rows"

# ── Post-job ──────────────────────────────────────────────────────────────

[[post_job.steps]]
type = "log_summary"

[[post_job.steps]]
type          = "raw_sql"
sql           = { env = "SINK__SYNC_SQL", default = "" }
skip_if_empty = true

# Case 3/4: drain queue before summary:
# [[post_job.steps]]
# type  = "drain_queue"
# queue = "db_rows"

# Custom Rust hook registered in main.rs:
# [[post_job.steps]]
# type = "custom"
# hook = "MyCustomHook"

# ── New backends (Idea 3) ─────────────────────────────────────────────────
# Uncomment and fill in the sections you want. Each backend is a Cargo feature.
#
# ── Postgres commit strategies ────────────────────────────────────────────
# Default (active): tx_scope — one transaction per window
# [[main_job.retry_steps]]
# type            = "tx_upsert"
# model           = "DbUser"
# reads           = "db_rows"
# commit_strategy = "tx_scope"      # default — omit to use tx_scope
#
# Autocommit — each row in its own tiny tx (partial success OK)
# [[main_job.retry_steps]]
# type            = "tx_upsert"
# model           = "DbUser"
# reads           = "db_rows"
# commit_strategy = "autocommit"
#
# Bulk tx — accumulate all windows, commit once in post_loop (Case 2)
# [slots.db_rows]
# scope = "job"   # change from "window" to accumulate across windows
# [[main_job.post_loop_steps]]
# type            = "tx_upsert"
# model           = "DbUser"
# reads           = "db_rows"
# commit_strategy = "bulk_tx"

# ── Elasticsearch sink ────────────────────────────────────────────────────
# Add to [features] in Cargo.toml: sync-engine = { features = ["elasticsearch"] }
#
# [resources.es]
# type = "elasticsearch"
# url  = { env = "ES_URL", default = "http://localhost:9200" }
#
# [[main_job.retry_steps]]
# type  = "es_index"
# model = "DbUser"       # must implement EsIndexable (impl es_id() -> String)
# index = "users"
# reads = "db_rows"
# op    = "upsert"       # upsert (default) | delete | create
#
# ES as a source (fetch via scroll API):
# [[main_job.retry_steps]]
# type       = "es_fetch"
# model      = "ApiUser"      # deserialized from ES _source
# index      = "source-users"
# writes     = "api_rows"
# scroll_ttl = "1m"           # default
# batch_size = 500            # default

# ── Kafka sink + source ───────────────────────────────────────────────────
# Add to [features] in Cargo.toml: sync-engine = { features = ["kafka"] }
#
# [resources.kafka]
# type     = "kafka"
# brokers  = { env = "KAFKA_BROKERS", default = "localhost:9092" }
# group_id = { env = "KAFKA_GROUP_ID", default = "sync-engine" }
# topic    = { env = "KAFKA_TOPIC" }   # required for consume trigger/source
#
# Kafka as sink (produce):
# [[main_job.retry_steps]]
# type      = "kafka_produce"
# model     = "DbUser"
# reads     = "db_rows"
# topic     = { env = "KAFKA_SINK_TOPIC" }
# key_field = "pccuid"   # optional — field name to use as message key
#
# Kafka as source (consume batch per window):
# [[main_job.retry_steps]]
# type         = "kafka_consume"
# model        = "ApiUser"
# writes       = "api_rows"
# topic        = { env = "KAFKA_SOURCE_TOPIC" }
# max_messages = 500     # default
# timeout_ms   = 5000    # default
#
# RabbitMQ ack strategy (on send_to_queue steps):
# [[main_job.retry_steps]]
# type         = "send_to_queue"
# reads        = "db_rows"
# queue        = "db_rows"
# ack_strategy = "ack_on_commit"    # default — ack after Postgres tx commits
# ack_strategy = "ack_on_receive"   # fast — ack immediately on receive (at-most-once)
# ack_strategy = "ack_per_batch"    # alias for ack_on_commit
