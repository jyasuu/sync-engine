# case9-elasticsearch-sink.toml
#
# Pattern: fetch from HTTP API → transform → index into Elasticsearch.
# Uses the ES bulk API via reqwest (no extra crate — feature "elasticsearch"
# enables the step but has zero new dependencies).
#
# Trade-offs vs case 1 (Postgres):
#   + Full-text search, aggregations, and geospatial queries on synced data
#   + Schema-free — fields can vary per document
#   + Horizontal scaling without schema migrations
#   - No ACID transactions — partial bulk failures are row-level
#   - Documents are eventually consistent (not immediately queryable)
#   - Requires DbUser to implement EsIndexable (add es_id() method)
#
# Cargo.toml requirement:
#   sync-engine = { features = ["elasticsearch"] }
#
# Additional main.rs requirement — implement EsIndexable on DbUser:
#   impl sync_engine::EsIndexable for DbUser {
#       fn es_id(&self) -> String { self.pccuid.to_string() }
#   }
#   Then use register_model_es instead of register_model:
#   registry.register_model_es::<DbUser>("DbUser");
#
# main.rs otherwise unchanged from case 1.

[job]
name = "user-sync"

[job.trigger]
type = "cron"
cron = { env = "SCHEDULER__CRON", default = "0 */30 * * * *" }

# ── Resources ─────────────────────────────────────────────────────────────

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type       = "http_service"
http       = "http"
auth       = "auth"
endpoint   = { env = "SOURCE__USER_ENDPOINT" }
realm_type = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }

# KEY: Elasticsearch target — no postgres resource needed
[resources.es]
type = "elasticsearch"
url  = { env = "ES_URL", default = "http://localhost:9200" }

# ── Slots ─────────────────────────────────────────────────────────────────

[slots.api_rows]
type  = "ApiUser"
scope = "window"

[slots.db_rows]
type  = "DbUser"
scope = "window"

# ── Pre-job ───────────────────────────────────────────────────────────────

[pre_job]
init_resources = true

# ── Main job ──────────────────────────────────────────────────────────────

[main_job.iterator]
type           = "date_window"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0" }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7" }
sleep_secs     = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

[main_job.retry]
max_attempts = 5
backoff_secs = 2

[[main_job.retry_steps]]
type     = "fetch"
envelope = "ApiUserResponse"
writes   = "api_rows"
append   = false

[[main_job.retry_steps]]
type      = "transform"
transform = "UserTransform"
reads     = "api_rows"
writes    = "db_rows"
append    = false

# KEY: index into Elasticsearch instead of Postgres
[[main_job.retry_steps]]
type  = "es_index"
model = "DbUser"        # must implement EsIndexable
index = "users"         # ES index name (created automatically if absent)
reads = "db_rows"
op    = "upsert"        # upsert (default) | delete | create

# ── Post-job ──────────────────────────────────────────────────────────────

[[post_job.steps]]
type = "log_summary"

# ── Variant: dual-write to both Postgres and ES ───────────────────────────
# To write the same records to both, add a tx_upsert step before es_index
# and add [resources.pg]. Both steps read from db_rows.
#
# [[main_job.retry_steps]]
# type  = "tx_upsert"
# model = "DbUser"
# reads = "db_rows"
#
# [[main_job.retry_steps]]
# type  = "es_index"
# model = "DbUser"
# index = "users"
# reads = "db_rows"
# op    = "upsert"
