# ═══════════════════════════════════════════════════════════════════════════
# SUB-PATTERN C — Kafka trigger
# Each Kafka message on TRIGGER__KAFKA_TOPIC fires one full pipeline tick.
# The message payload is ignored — it's a signal, not the data.
# ═══════════════════════════════════════════════════════════════════════════

