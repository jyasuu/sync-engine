# case1-tx-per-window.toml
#
# Pattern: fetch → transform → commit, one Postgres transaction per window.
# Simplest and safest. Each window is independent — failure retries only
# that window; all previous windows are already durable.
#
# main.rs:
#   registry.register_envelope::<ApiUserResponse>("ApiUserResponse");
#   registry.register_transform::<ApiUser, DbUser, UserTransform>("UserTransform");
#   registry.register_model::<DbUser>("DbUser");
#   sync_engine::run("pipeline.toml", registry).await

[job]
name = "user-sync"

[job.scheduler]
cron = { env = "SCHEDULER__CRON", default = "0 */30 * * * *" }

# ── Resources — identical in all four cases ───────────────────────────────

[resources.pg]
type            = "postgres"
url             = { env = "SINK__DATABASE_URL" }
max_connections = 5

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type         = "http_service"
http         = "http"
auth         = "auth"
endpoint     = { env = "SOURCE__USER_ENDPOINT" }
realm_type   = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }
# start_param = "start_time"   # default — override for APIs using different names
# end_param   = "end_time"     # default
# date_format = "%Y%m%d"       # default — e.g. "%Y-%m-%d" or "%s" for unix timestamp

# ── Slots — window scope: cleared before each retry attempt ───────────────

[slots.api_rows]
type  = "ApiUser"
scope = "window"

[slots.db_rows]
type  = "DbUser"
scope = "window"    # KEY: window = cleared every retry; tx commits inside loop

# ── Pre-job ───────────────────────────────────────────────────────────────

[pre_job]
init_resources = true

# ── Main job ──────────────────────────────────────────────────────────────

[main_job.iterator]
type           = "date_window"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0" }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7" }
sleep_secs     = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

[main_job.retry]
max_attempts = 5
backoff_secs = 2

[[main_job.retry_steps]]
type     = "fetch"
envelope = "ApiUserResponse"
writes   = "api_rows"
append   = false

[[main_job.retry_steps]]
type      = "transform"
transform = "UserTransform"
reads     = "api_rows"
writes    = "db_rows"
append    = false

[[main_job.retry_steps]]
type  = "tx_upsert"     # commit happens here, inside the retry loop
model = "DbUser"
reads = "db_rows"

[[main_job.post_window_steps]]
type = "sleep"
secs = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

# ── Post-job ──────────────────────────────────────────────────────────────

[[post_job.steps]]
type = "log_summary"

[[post_job.steps]]
type          = "raw_sql"
sql           = { env = "SINK__SYNC_SQL", default = "" }
skip_if_empty = true

[[post_job.steps]]
type = "custom"
hook = "UserSyncSummary"    # optional: register in main.rs or remove this step
