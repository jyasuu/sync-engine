# case2-composable.toml
#
# Same pattern as case2-bulk-tx.toml (accumulate all windows, one bulk commit)
# rewritten in the composable step_groups style.
#
# The key structural difference from case1-composable.toml:
#   - db_rows slot scope = "job"  (survives across windows)
#   - transform has append = true (accumulates rather than replaces)
#   - No tx wrapper inside the retry — the commit happens AFTER the window loop
#   - A standalone tx_upsert after the window_loop does the single bulk commit
#
# main.rs is identical to case1 — no Rust changes needed.

[job]
name = "user-sync"

[job.trigger]
type = "cron"
cron = { env = "SCHEDULER__CRON", default = "0 */30 * * * *" }

[resources.pg]
type            = "postgres"
url             = { env = "SINK__DATABASE_URL" }
max_connections = 5

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type       = "http_service"
http       = "http"
auth       = "auth"
endpoint   = { env = "SOURCE__USER_ENDPOINT" }
realm_type = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }

[slots.api_rows]
type  = "ApiUser"
scope = "window"

[slots.db_rows]
type  = "DbUser"
scope = "job"           # KEY: accumulates across all windows

[pre_job]
init_resources = true

# ── Step groups ───────────────────────────────────────────────────────────

[step_groups.fetch_and_accumulate]
steps = [
  { type = "fetch",     envelope = "ApiUserResponse", writes = "api_rows" },
  { type = "transform", transform = "UserTransform",  reads  = "api_rows", writes = "db_rows", append = true },
  # No tx here — rows accumulate in the job-scoped db_rows slot
]

# ── Main job ──────────────────────────────────────────────────────────────
#
# window_loop        — iterates date windows
#   retry            — retries fetch+transform on failure
#     (fetch_and_accumulate group)
#   sleep            — rate-limit pause between windows
# tx_upsert          — single bulk commit after all windows complete

[[main_job.steps]]
type           = "window_loop"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0"  }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7"  }
steps = [
  { type = "retry", max_attempts = 5, backoff_secs = 2, group = "fetch_and_accumulate" },
  { type = "sleep", secs = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" } },
]

# Bulk commit — runs once after the window_loop exhausts all windows.
# db_rows holds every transformed row from every window at this point.
[[main_job.steps]]
type  = "tx_upsert"
model = "DbUser"
reads = "db_rows"

# ── Post-job ──────────────────────────────────────────────────────────────

[[post_job.steps]]
type = "log_summary"

[[post_job.steps]]
type          = "raw_sql"
sql           = { env = "SINK__SYNC_SQL", default = "" }
skip_if_empty = true
