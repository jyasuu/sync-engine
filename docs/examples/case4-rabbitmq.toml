# case4-rabbitmq.toml
#
# Pattern: async producer / consumer using RabbitMQ as the transport layer.
# Structurally identical to case 3 — only the [queues.db_rows] block changes.
#
# Trade-offs vs case 3 (tokio):
#   + Messages survive process restarts (durable exchange)
#   + Multiple consumers can subscribe (fan-out / parallel processing)
#   + Producer and consumer can be separate services
#   - Requires a running RabbitMQ broker
#   - Higher latency per message due to network round-trip
#   - Message serialization/deserialization overhead
#
# Changed from case 3:
#   [queues.db_rows]   type = "rabbitmq" + url/exchange/routing_key
#   Everything else is identical to case 3.
#
# Composable version: case4-composable.toml

[job]
name = "user-sync"

[job.trigger]
type = "cron"
cron = { env = "SCHEDULER__CRON", default = "0 */30 * * * *" }

[resources.pg]
type            = "postgres"
url             = { env = "SINK__DATABASE_URL" }
max_connections = 5

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type         = "http_service"
http         = "http"
auth         = "auth"
endpoint     = { env = "SOURCE__USER_ENDPOINT" }
realm_type   = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }
# start_param = "start_time"   # default — override for APIs using different names
# end_param   = "end_time"     # default
# date_format = "%Y%m%d"       # default — e.g. "%Y-%m-%d" or "%s" for unix timestamp

[slots.api_rows]
type  = "ApiUser"
scope = "window"

# KEY: the only change from case 3 — RabbitMQ instead of tokio mpsc
[queues.db_rows]
type        = "rabbitmq"
url         = { env = "RABBITMQ_URL" }                              # amqp://user:pass@host:5672/vhost
exchange    = { env = "RABBITMQ_EXCHANGE",    default = "sync" }
routing_key = { env = "RABBITMQ_ROUTING_KEY", default = "db_rows" }

[pre_job]
init_resources = true

[[pre_job.steps]]
type        = "spawn_consumer"
queue       = "db_rows"
model       = "DbUser"
commit_mode = "per_batch"

[main_job.iterator]
type           = "date_window"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0" }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7" }
sleep_secs     = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

[main_job.retry]
max_attempts = 5
backoff_secs = 2

[[main_job.retry_steps]]
type     = "fetch"
envelope = "ApiUserResponse"
writes   = "api_rows"
append   = false

[[main_job.retry_steps]]
type      = "transform"
transform = "UserTransform"
reads     = "api_rows"
writes    = "db_rows_tmp"
append    = false

[[main_job.retry_steps]]
type  = "send_to_queue"
reads = "db_rows_tmp"
queue = "db_rows"

[[main_job.post_window_steps]]
type = "sleep"
secs = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

[[post_job.steps]]
type  = "drain_queue"
queue = "db_rows"

[[post_job.steps]]
type = "log_summary"

[[post_job.steps]]
type          = "raw_sql"
sql           = { env = "SINK__SYNC_SQL", default = "" }
skip_if_empty = true

[[post_job.steps]]
type = "custom"
hook = "UserSyncSummary"
