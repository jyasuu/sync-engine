# case5-trigger-once.toml
#
# Pattern: run a single tick then exit with code 0.
# Identical pipeline to case 1 — only [job.trigger] changes.
#
# Use for:
#   - CI jobs (run sync as part of a pipeline, fail build on error)
#   - Kubernetes Jobs (one-shot pod, k8s handles restart policy)
#   - Manual backfill (SOURCE__START_INTERVAL / END_INTERVAL override via env)
#   - Smoke tests (SOURCE__INTERVAL_LIMIT=1 to process a single window)
#
# Changed from case 1:
#   [job.trigger]   type = "once"   (was type = "cron")
#
# main.rs:
#   registry.register_envelope::<ApiUserResponse>("ApiUserResponse");
#   registry.register_transform::<ApiUser, DbUser, UserTransform>("UserTransform");
#   registry.register_model::<DbUser>("DbUser");
#   sync_engine::run("pipeline.toml", registry).await

[job]
name = "user-sync"

# KEY: run once and exit — no scheduler, no Ctrl-C wait
[job.trigger]
type = "once"

# ── Resources — identical in all cases ───────────────────────────────────

[resources.pg]
type            = "postgres"
url             = { env = "SINK__DATABASE_URL" }
max_connections = 5

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type       = "http_service"
http       = "http"
auth       = "auth"
endpoint   = { env = "SOURCE__USER_ENDPOINT" }
realm_type = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }

# ── Slots ─────────────────────────────────────────────────────────────────

[slots.api_rows]
type  = "ApiUser"
scope = "window"

[slots.db_rows]
type  = "DbUser"
scope = "window"

# ── Pre-job ───────────────────────────────────────────────────────────────

[pre_job]
init_resources = true

# ── Main job ──────────────────────────────────────────────────────────────
#
# Tip: override the window range at runtime for targeted backfills:
#   SOURCE__START_INTERVAL=90 SOURCE__END_INTERVAL=60 SOURCE__INTERVAL_LIMIT=30 cargo run

[main_job.iterator]
type           = "date_window"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0" }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7" }
sleep_secs     = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

[main_job.retry]
max_attempts = 5
backoff_secs = 2

[[main_job.retry_steps]]
type     = "fetch"
envelope = "ApiUserResponse"
writes   = "api_rows"
append   = false

[[main_job.retry_steps]]
type      = "transform"
transform = "UserTransform"
reads     = "api_rows"
writes    = "db_rows"
append    = false

[[main_job.retry_steps]]
type  = "tx_upsert"
model = "DbUser"
reads = "db_rows"

# ── Post-job ──────────────────────────────────────────────────────────────

[[post_job.steps]]
type = "log_summary"

[[post_job.steps]]
type          = "raw_sql"
sql           = { env = "SINK__SYNC_SQL", default = "" }
skip_if_empty = true
