# case7-trigger-pg-notify.toml
#
# Pattern: Postgres LISTEN/NOTIFY fires a sync tick.
# The engine issues LISTEN on the configured channel at startup and runs
# one tick per NOTIFY received. Concurrent notifications while a tick is
# running are mutex-skipped.
#
# Use for:
#   - Tight coupling to a Postgres-resident upstream (e.g. trigger after
#     an INSERT/UPDATE in a source table)
#   - Zero extra infrastructure — no RabbitMQ, no HTTP server needed
#   - Row-level change notification from a Postgres trigger function
#
# Changed from case 1:
#   [job.trigger]   type = "pg_notify"   (was type = "cron")
#   No other changes — same pipeline, same resources.
#
# Fire a sync from psql:
#   SELECT pg_notify('sync_trigger', '{}');
#
# Typical Postgres trigger to auto-notify on source table changes:
#   CREATE OR REPLACE FUNCTION notify_sync() RETURNS trigger AS $$
#   BEGIN PERFORM pg_notify('sync_trigger', '{}'); RETURN NEW; END;
#   $$ LANGUAGE plpgsql;
#   CREATE TRIGGER trg_sync AFTER INSERT OR UPDATE ON source_users
#   FOR EACH STATEMENT EXECUTE FUNCTION notify_sync();
#
# main.rs — unchanged from case 1.

[job]
name = "user-sync"

# KEY: block on LISTEN; each NOTIFY fires one tick
[job.trigger]
type    = "pg_notify"
channel = { env = "TRIGGER__PG_CHANNEL", default = "sync_trigger" }

# ── Resources — identical in all cases ───────────────────────────────────
# Note: pg_notify reuses the same Postgres URL from [resources.pg].

[resources.pg]
type            = "postgres"
url             = { env = "SINK__DATABASE_URL" }
max_connections = 5

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type       = "http_service"
http       = "http"
auth       = "auth"
endpoint   = { env = "SOURCE__USER_ENDPOINT" }
realm_type = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }

# ── Slots ─────────────────────────────────────────────────────────────────

[slots.api_rows]
type  = "ApiUser"
scope = "window"

[slots.db_rows]
type  = "DbUser"
scope = "window"

# ── Pre-job ───────────────────────────────────────────────────────────────

[pre_job]
init_resources = true

# ── Main job ──────────────────────────────────────────────────────────────

[main_job.iterator]
type           = "date_window"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0" }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7" }
sleep_secs     = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

[main_job.retry]
max_attempts = 5
backoff_secs = 2

[[main_job.retry_steps]]
type     = "fetch"
envelope = "ApiUserResponse"
writes   = "api_rows"
append   = false

[[main_job.retry_steps]]
type      = "transform"
transform = "UserTransform"
reads     = "api_rows"
writes    = "db_rows"
append    = false

[[main_job.retry_steps]]
type  = "tx_upsert"
model = "DbUser"
reads = "db_rows"

# ── Post-job ──────────────────────────────────────────────────────────────

[[post_job.steps]]
type = "log_summary"

[[post_job.steps]]
type          = "raw_sql"
sql           = { env = "SINK__SYNC_SQL", default = "" }
skip_if_empty = true
