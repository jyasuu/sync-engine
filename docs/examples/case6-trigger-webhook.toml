# case6-trigger-webhook.toml
#
# Pattern: HTTP POST to :8080 fires a sync tick.
# The engine binds a TCP listener; any POST to any path returns 202 Accepted
# immediately and runs the tick in the background. Concurrent POSTs while a
# tick is already running are mutex-skipped (no duplicate runs).
#
# Use for:
#   - Event-driven sync triggered by an upstream service
#   - CI/CD pipelines that POST after a data export completes
#   - Admin dashboards with a "sync now" button
#   - Webhooks from external systems (GitHub, Stripe, etc.)
#
# Changed from case 1:
#   [job.trigger]   type = "webhook"   (was type = "cron")
#
# Trigger a sync:
#   curl -X POST http://localhost:8080/sync
#
# main.rs — unchanged from case 1.

[job]
name = "user-sync"

# KEY: listen for HTTP POST; each POST fires one tick
[job.trigger]
type = "webhook"
host = "0.0.0.0"   # bind address (default)
port = 8080         # listen port  (default)

# ── Resources — identical in all cases ───────────────────────────────────

[resources.pg]
type            = "postgres"
url             = { env = "SINK__DATABASE_URL" }
max_connections = 5

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type       = "http_service"
http       = "http"
auth       = "auth"
endpoint   = { env = "SOURCE__USER_ENDPOINT" }
realm_type = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }

# ── Slots ─────────────────────────────────────────────────────────────────

[slots.api_rows]
type  = "ApiUser"
scope = "window"

[slots.db_rows]
type  = "DbUser"
scope = "window"

# ── Pre-job ───────────────────────────────────────────────────────────────

[pre_job]
init_resources = true

# ── Main job ──────────────────────────────────────────────────────────────

[main_job.iterator]
type           = "date_window"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0" }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7" }
sleep_secs     = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" }

[main_job.retry]
max_attempts = 5
backoff_secs = 2

[[main_job.retry_steps]]
type     = "fetch"
envelope = "ApiUserResponse"
writes   = "api_rows"
append   = false

[[main_job.retry_steps]]
type      = "transform"
transform = "UserTransform"
reads     = "api_rows"
writes    = "db_rows"
append    = false

[[main_job.retry_steps]]
type  = "tx_upsert"
model = "DbUser"
reads = "db_rows"

# ── Post-job ──────────────────────────────────────────────────────────────

[[post_job.steps]]
type = "log_summary"

[[post_job.steps]]
type          = "raw_sql"
sql           = { env = "SINK__SYNC_SQL", default = "" }
skip_if_empty = true
