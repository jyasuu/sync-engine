# case4-composable.toml
#
# Same pattern as case4-rabbitmq.toml (RabbitMQ producer/consumer)
# rewritten in the composable step_groups style.
#
# Identical to case3-composable.toml except for [queues.db_rows] — the only
# line that changes between case 3 and case 4 is the queue transport.
# Everything else — step groups, window_loop, retry, post_job — is the same.
#
# main.rs is identical to cases 1–3.

[job]
name = "user-sync"

[job.trigger]
type = "cron"
cron = { env = "SCHEDULER__CRON", default = "0 */30 * * * *" }

[resources.pg]
type            = "postgres"
url             = { env = "SINK__DATABASE_URL" }
max_connections = 5

[resources.auth]
type          = "oauth2"
token_url     = { env = "AUTH__TOKEN_URL" }
client_id     = { env = "AUTH__CLIENT_ID" }
client_secret = { env = "AUTH__CLIENT_SECRET" }

[resources.http]
type           = "http_client"
timeout_secs   = 620
keepalive_secs = 30

[resources.svc]
type       = "http_service"
http       = "http"
auth       = "auth"
endpoint   = { env = "SOURCE__USER_ENDPOINT" }
realm_type = { env = "SOURCE__INCLUDE_REALM_TYPES", default = "" }

[slots.api_rows]
type  = "ApiUser"
scope = "window"

# KEY: the only difference from case3-composable — RabbitMQ instead of tokio
[queues.db_rows]
type        = "rabbitmq"
url         = { env = "RABBITMQ_URL" }
exchange    = { env = "RABBITMQ_EXCHANGE",    default = "sync" }
routing_key = { env = "RABBITMQ_ROUTING_KEY", default = "db_rows" }

[pre_job]
init_resources = true

[[pre_job.steps]]
type        = "spawn_consumer"
model       = "DbUser"
queue       = "db_rows"
commit_mode = "per_batch"

# ── Step groups ───────────────────────────────────────────────────────────

[step_groups.fetch_and_enqueue]
steps = [
  { type = "fetch",         envelope = "ApiUserResponse", writes = "api_rows" },
  { type = "transform",     transform = "UserTransform",  reads  = "api_rows", writes = "db_rows" },
  { type = "send_to_queue", model = "DbUser",             reads  = "db_rows",  queue  = "db_rows" },
]

# ── Main job ──────────────────────────────────────────────────────────────

[[main_job.steps]]
type           = "window_loop"
start_interval = { env = "SOURCE__START_INTERVAL",    default = "30" }
end_interval   = { env = "SOURCE__END_INTERVAL",      default = "0"  }
interval_limit = { env = "SOURCE__INTERVAL_LIMIT",    default = "7"  }
steps = [
  { type = "retry", max_attempts = 5, backoff_secs = 2, group = "fetch_and_enqueue" },
  { type = "sleep", secs = { env = "SOURCE__WINDOW_SLEEP_SECS", default = "60" } },
]

# ── Post-job ──────────────────────────────────────────────────────────────

[[post_job.steps]]
type  = "drain_queue"
queue = "db_rows"

[[post_job.steps]]
type = "log_summary"

[[post_job.steps]]
type          = "raw_sql"
sql           = { env = "SINK__SYNC_SQL", default = "" }
skip_if_empty = true
